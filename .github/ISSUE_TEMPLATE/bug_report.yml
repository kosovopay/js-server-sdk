name: Bug report
description: Something in the SDK isn't behaving as documented.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: A minimal code snippet that triggers the issue.
      render: ts
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SDK version
      placeholder: "@kosovopay/server-sdk@0.2.0"
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node
        - Bun
        - Deno
        - Cloudflare Workers
        - Other
    validations:
      required: true
  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      placeholder: "Node 22.3.0"
