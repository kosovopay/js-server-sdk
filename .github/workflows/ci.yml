name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint & format check
        run: bun run lint

  test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Test
        run: bun test
      - name: Build
        run: bun run build
      - name: Portability — no Node builtins in build output
        run: |
          if grep -rnE "(^|[^.])require\(|from ['\"]node:" dist/*.js dist/**/*.js; then
            echo "::error::Build output references Node builtins — breaks Deno/Workers."
            exit 1
          fi
          echo "OK: build output is free of Node builtins."

  # Proves the headline claim: the SAME build runs on every runtime.
  smoke-node:
    name: Smoke (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
      - name: Smoke test
        run: node scripts/smoke.mjs

  smoke-deno:
    name: Smoke (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Smoke test
        run: deno run -A scripts/smoke.mjs
